name: Setup Services
description: Start Docker services based on comma-separated list of service names

inputs:
  services:
    description: Comma-separated list of services to start (e.g., postgres,minio)
    required: true
  dbSchema:
    description: The DB schema to create while running the DB
    required: false

runs:
  using: composite
  steps:
    - name: Start Services
      shell: bash
      run: |
        IFS=',' read -ra SERVICE_LIST <<< "${{ inputs.services }}"
        TRIM_SCRIPT='s/^[[:space:]]*//;s/[[:space:]]*$//'

        for service in "${SERVICE_LIST[@]}"; do
          service=$(echo "$service" | sed -e "$TRIM_SCRIPT")

          case "$service" in
            postgres)
              echo "Starting PostgreSQL..."
              POSTGRES_DB="${{ inputs.dbSchema }}"
              POSTGRES_DB="${POSTGRES_DB:-postgres}"
              docker run -d --name postgres -p 5432:5432 \
                -e POSTGRES_USER=postgres \
                -e POSTGRES_PASSWORD=postgres \
                -e POSTGRES_DB="$POSTGRES_DB" \
                postgres:17-alpine
              until docker exec postgres pg_isready -U postgres; do sleep 1; done
              echo "DB_HOST=localhost" >> $GITHUB_ENV
              echo "DB_PORT=5432" >> $GITHUB_ENV
              echo "DB_USER=postgres" >> $GITHUB_ENV
              echo "DB_PASSWORD=postgres" >> $GITHUB_ENV
              echo "DB_NAME=$POSTGRES_DB" >> $GITHUB_ENV
              ;;
            mysql)
              echo "Starting MySQL..."
              MYSQL_DB="${{ inputs.dbSchema }}"
              MYSQL_DB="${MYSQL_DB:-mysql}"
              docker run -d --name mysql -p 3306:3306 \
                -e MYSQL_ROOT_PASSWORD=mysql \
                -e MYSQL_DATABASE="$MYSQL_DB" \
                mysql:8.0 \
                --log-bin-trust-function-creators=1
              until docker exec mysql mysqladmin ping -u root -pmysql --silent; do sleep 1; done
              echo "DB_HOST=localhost" >> $GITHUB_ENV
              echo "DB_PORT=3306" >> $GITHUB_ENV
              echo "DB_USER=root" >> $GITHUB_ENV
              echo "DB_PASSWORD=mysql" >> $GITHUB_ENV
              echo "DB_NAME=$MYSQL_DB" >> $GITHUB_ENV
              ;;
            minio)
              echo "Starting MinIO..."
              docker run -d --name minio -p 9000:9000 \
                -e MINIO_ROOT_USER=minio \
                -e MINIO_ROOT_PASSWORD=minio123 \
                minio/minio:latest server /data
              echo "MINIO_ENDPOINT=http://localhost:9000" >> $GITHUB_ENV
              echo "MINIO_ACCESS_KEY=minio" >> $GITHUB_ENV
              echo "MINIO_SECRET_KEY=minio123" >> $GITHUB_ENV
              ;;
            redis)
              echo "Starting Redis..."

              docker run -d --name redis -p 6379:6379 \
                redis:7-alpine

              until docker exec redis redis-cli ping | grep PONG; do sleep 1; done

              echo "REDIS_HOST=localhost" >> $GITHUB_ENV
              echo "REDIS_PORT=6379" >> $GITHUB_ENV
              ;;
            *)
              echo "Unknown service: $service - skipping"
              ;;
          esac
        done
