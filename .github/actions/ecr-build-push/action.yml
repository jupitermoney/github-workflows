name: ECR Build and Push
description: Build a single jib module, run Trivy security scan, and push to ECR

inputs:
  module:
    description: Gradle module path (e.g. :services:lms:server)
    required: true
  image-name:
    description: Docker image name (e.g. lms)
    required: true
  tag-prefix:
    description: Image tag prefix (rc/hotfix/pr) — auto-overridden to "pr" on pull_request events and "hotfix" on hotfix-* branches
    required: true
  ecr-registry:
    description: ECR registry URL
    required: true
  java-version:
    description: Java version to use
    required: true
  aws-access-key-id:
    description: AWS access key ID
    required: true
  aws-secret-access-key:
    description: AWS secret access key
    required: true
  approval-service-url:
    description: Trivy approval service URL
    required: true
  approval-service-token:
    description: Trivy approval service token
    required: true

runs:
  using: composite
  steps:
    - name: Compute Docker Tag
      shell: bash
      run: |
        if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
          TAG_PREFIX="pr"
          SHORT_SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-8)
        elif [[ "${GITHUB_REF_NAME}" == hotfix-* ]]; then
          TAG_PREFIX="hotfix"
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-8)
        else
          TAG_PREFIX="${{ inputs.tag-prefix }}"
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-8)
        fi

        echo "DOCKER_IMAGE_TAG=${TAG_PREFIX}-${SHORT_SHA}" >> $GITHUB_ENV

    - uses: jm-imported-code/setup-java@v1
      with:
        java-version: ${{ inputs.java-version }}

    - uses: jm-imported-code/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
        restore-keys: gradle-${{ runner.os }}-

    - name: Configure AWS credentials
      uses: jm-imported-code/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ inputs.aws-access-key-id }}
        aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
        aws-region: ap-south-1

    - name: Login to AWS ECR
      uses: jm-imported-code/amazon-ecr-login@v1.0.1
      with:
        registries: 454518750364

    - name: Build Module
      shell: bash
      run: ./gradlew build ${{ inputs.module }}:jibDockerBuild

    - name: Tag Image
      shell: bash
      run: |
        docker tag \
          "${{ inputs.image-name }}:latest" \
          "${{ inputs.ecr-registry }}/${{ inputs.image-name }}:$DOCKER_IMAGE_TAG"

    - name: Run Trivy Scan
      uses: jupitermoney/security-automations@main
      with:
        tool: trivy
        image-name: "${{ inputs.ecr-registry }}/${{ inputs.image-name }}:${{ env.DOCKER_IMAGE_TAG }}"
        approval-service-url: ${{ inputs.approval-service-url }}
        approval-service-token: ${{ inputs.approval-service-token }}

    - name: Docker Push
      shell: bash
      run: docker push "${{ inputs.ecr-registry }}/${{ inputs.image-name }}:$DOCKER_IMAGE_TAG"

    - name: Logout
      if: always()
      shell: bash
      run: docker logout ${{ inputs.ecr-registry }}
