name: Universal ECR Publisher

on:
  workflow_call:

    # ─────────────────────────────
    # INPUTS – FULLY CONFIGURABLE
    # ─────────────────────────────
    inputs:

      ecr_registry:
        type: string
        default: "454518750364.dkr.ecr.ap-south-1.amazonaws.com"

      java_version:
        type: string
        default: "21"
        required: true

      # ───── Tagging ─────
      tag_prefix:
        type: string
        default: "rc" # auto-overridden to "hotfix" for hotfix-* branches

# ─────────────────────────────────────────
# GLOBAL ENV
# ─────────────────────────────────────────
env:
  ECR_REGISTRY: ${{ inputs.ecr_registry }}

  # Security / Trivy
  APPROVAL_SERVICE_URL: "https://trivy.audit.jupiter.money"
  APPROVAL_SERVICE_TOKEN: ${{ secrets.APPROVAL_SERVICE_TOKEN }}

  # Git Context
  CI_COMMIT_SHA: ${{ github.sha }}
  GITHUB_USER: ${{ secrets.CI_GITHUB_USER }}
  GITHUB_TOKEN: ${{ secrets.CI_GITHUB_TOKEN }}

  # Artifactory
  ARTIFACTORY_USER: ${{ secrets.ARTIFACTORY_USER }}
  ARTIFACTORY_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}
  SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
  GITHUB_EVENT: ${{ toJson(github.event) }}

# ─────────────────────────────────────────
# JOBS
# ─────────────────────────────────────────

jobs:

  # ─────────────────────────────────────────────────────────────────
  # STEP 1 — Resolve metadata + test entire codebase once + Sonar
  #
  # Single Gradle cold start: generateServiceMetadata and test run
  # in one invocation. Cache is saved here so matrix jobs downstream
  # restore it and skip all dependency downloads.
  # ─────────────────────────────────────────────────────────────────

  test:
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.parse.outputs.matrix }}
      sonar_enabled: ${{ steps.parse.outputs.sonar_enabled }}

    steps:
      - uses: jm-imported-code/checkout@v1
        with:
          fetch-depth: 0  # required for Sonar blame analysis

      - uses: jm-imported-code/setup-java@v1
        with:
          java-version: ${{ inputs.java_version }}

      - name: Restore Gradle Cache
        uses: jm-imported-code/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # Always runs — produces build/metadata/service-metadata.json which
      # the parse step needs to build the matrix for build-push.
      - name: Generate Service Metadata
        run: ./gradlew generateServiceMetadata

      # Skipped on pull_request events — PR validation is handled by java-app-pr-check.yml.
      - name: Run Tests
        if: github.event_name == 'push'
        run: ./gradlew test

      - name: Parse Service Metadata
        id: parse
        run: |
          METADATA_FILE="build/metadata/service-metadata.json"

          if [[ ! -f "$METADATA_FILE" ]]; then
            echo "❌ $METADATA_FILE not found. Ensure generateServiceMetadata ran successfully."
            exit 1
          fi

          MODULE_COUNT=$(jq '.jibModules | length' "$METADATA_FILE")
          if [[ "$MODULE_COUNT" -eq 0 ]]; then
            echo "❌ jibModules array is empty. Nothing to build."
            exit 1
          fi

          MATRIX=$(jq -c '{include: [.jibModules[] | {module: .module, toImage: .toImage}]}' "$METADATA_FILE")
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

          SONAR_ENABLED=$(jq -r '.sonar.enabled // false' "$METADATA_FILE")
          echo "sonar_enabled=$SONAR_ENABLED" >> $GITHUB_OUTPUT

          echo "Found $MODULE_COUNT jib module(s):"
          echo "$MATRIX" | jq -r '.include[] | "  - \(.module)"'
          echo "Sonar enabled: $SONAR_ENABLED"

      # Runs in the same job so JaCoCo reports from the test step above are
      # already on disk — no need to re-run tests.
      - name: Run Sonar Analysis
        if: github.event_name == 'push' && steps.parse.outputs.sonar_enabled == 'true'
        run: |
          echo "skipping sonar"
          # ./gradlew sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ─────────────────────────────────────────────────────────────────
  # STEP 2 — Build and push per module (matrix)
  #
  # Gradle cache restored from STEP 1 — no dependency downloads.
  # Only jibDockerBuild runs per module; tests are already done.
  # ─────────────────────────────────────────────────────────────────

  build-push:
    needs: test
    runs-on: ubuntu-latest

    strategy:
      matrix: ${{ fromJSON(needs.test.outputs.matrix) }}

    steps:
      - uses: jm-imported-code/checkout@v1

      # ─────────────── TAG STRATEGY ───────────────

      - name: Compute Docker Tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" == hotfix-* ]]; then
            TAG_PREFIX="hotfix"
          else
            TAG_PREFIX="${{ inputs.tag_prefix }}"
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            SHORT_SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-8)
          else
            SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-8)
          fi

          echo "DOCKER_IMAGE_TAG=${TAG_PREFIX}-${SHORT_SHA}" >> $GITHUB_ENV

      # ─────────────── JAVA SETUP ───────────────

      - uses: jm-imported-code/setup-java@v1
        with:
          java-version: ${{ inputs.java_version }}

      - name: Restore Gradle Cache
        uses: jm-imported-code/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # ─────────────── AWS ───────────────

      - name: Configure AWS credentials
        uses: jm-imported-code/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ap-south-1

      - name: Login to AWS ECR
        uses: jm-imported-code/amazon-ecr-login@v1.0.1
        with:
          registries: 454518750364

      # ─────────────── BUILD ───────────────

      - name: Build Module
        run: ./gradlew ${{ matrix.module }}:jibDockerBuild

      # ─────────────── TAG ───────────────

      - name: Tag Image
        run: |
          docker tag \
            "${{ matrix.toImage }}:latest" \
            "${{ env.ECR_REGISTRY }}/${{ matrix.toImage }}:$DOCKER_IMAGE_TAG"

      # ─────────────── SECURITY ───────────────

      - name: Run Trivy Scan
        uses: jupitermoney/security-automations@main
        with:
          tool: trivy
          image-name: "${{ env.ECR_REGISTRY }}/${{ matrix.toImage }}:${{ env.DOCKER_IMAGE_TAG }}"
          approval-service-url: ${{ env.APPROVAL_SERVICE_URL }}
          approval-service-token: ${{ secrets.APPROVAL_SERVICE_TOKEN }}

      # ─────────────── PUSH ───────────────

      - name: Docker Push
        run: docker push "${{ env.ECR_REGISTRY }}/${{ matrix.toImage }}:$DOCKER_IMAGE_TAG"

      - name: Logout
        if: always()
        run: docker logout $ECR_REGISTRY
