name: Java App PR Check

on:
  workflow_call:

    inputs:

      java_version:
        type: string
        default: "21"
        required: true

# ─────────────────────────────────────────
# GLOBAL ENV
# ─────────────────────────────────────────
env:
  CI_COMMIT_SHA: ${{ github.sha }}
  GITHUB_USER: ${{ secrets.CI_GITHUB_USER }}
  GITHUB_TOKEN: ${{ secrets.CI_GITHUB_TOKEN }}
  GITHUB_EVENT: ${{ toJson(github.event) }}
  ARTIFACTORY_USER: ${{ secrets.ARTIFACTORY_USER }}
  ARTIFACTORY_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}
  SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}

# ─────────────────────────────────────────
# JOBS
# ─────────────────────────────────────────

jobs:

  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: jm-imported-code/checkout@v1
        with:
          fetch-depth: 0  # required for Sonar blame analysis and new-code detection

      - uses: jm-imported-code/setup-java@v1
        with:
          java-version: ${{ inputs.java_version }}

      - name: Restore Gradle Cache
        uses: jm-imported-code/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # ─────────────── METADATA ───────────────

      - name: Generate Service Metadata
        run: ./gradlew generateServiceMetadata

      # ─────────────── BUILD ───────────────

      - name: Build
        run: ./gradlew build -x test

      # ─────────────── TEST ───────────────

      - name: Test
        run: ./gradlew test

      # ─────────────── SONAR (if enabled) ───────────────

      - name: Run Sonar Analysis
        run: |
          SONAR_ENABLED=$(jq -r '.sonar.enabled // false' build/metadata/service-metadata.json)
          if [[ "$SONAR_ENABLED" == "true" ]]; then
            echo "Sonar enabled — running analysis..."
            ./gradlew sonar
          else
            echo "Sonar disabled in project config, skipping."
          fi
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
