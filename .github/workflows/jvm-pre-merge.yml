name: JVM App PR Check

on:
  workflow_call:

    inputs:

      java_version:
        type: string
        default: "21"
        required: true

      # ───── Optional ECR publish ─────
      publish:
        type: boolean
        default: false

      # ───── Services to start (comma-separated list e.g., postgres,minio) ─────
      services:
        type: string
        description: "Comma-separated list of services to start (e.g., postgres,minio)"
        default: ""
        required: false

      ecr_registry: # staging account
        type: string
        # staging account
        default: "454518750364.dkr.ecr.ap-south-1.amazonaws.com" # only used when publish: true

      dbSchema:
        type: string
        description: The DB schema to create while running the DB
        required: false

      # ───── Lambda / S3 deploy mode ─────
      s3_deploy:
        type: boolean
        default: false
        description: "Set true for Lambda services — skips generate-metadata and ECR publish"

      s3_bucket:
        type: string
        default: ""
        description: "S3 bucket for Lambda artifact upload (required when s3_deploy: true)"

      app_modules:
        type: string
        default: "[]"
        description: >
          JSON array of Lambda modules to build and upload (required when s3_deploy: true).
          Each entry must have 'module' (Gradle module dir) and 's3_prefix' (S3 key prefix).
          Example: '[{"module":"my-app","s3_prefix":"my-service"}]'

# ─────────────────────────────────────────
# GLOBAL ENV
# ─────────────────────────────────────────
env:
  CI_COMMIT_SHA: ${{ github.sha }}
  GITHUB_USER: ${{ secrets.CI_GITHUB_USER }}
  GITHUB_TOKEN: ${{ secrets.CI_GITHUB_TOKEN }}
  GITHUB_EVENT: ${{ toJson(github.event) }}
  ARTIFACTORY_USER: ${{ secrets.ARTIFACTORY_USER }}
  ARTIFACTORY_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}
  SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
  REPO_METADATA_TOKEN: ${{ secrets.CI_GITHUB_TOKEN_METADATA_REPO }}
  IS_STANDARD_PR_CHECK_WORKFLOW: true

# ─────────────────────────────────────────
# JOBS
# ─────────────────────────────────────────

jobs:

  build-test:
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.metadata.outputs.matrix }}
      sonar_enabled: ${{ steps.metadata.outputs.sonar_enabled }}

    steps:
      - name: JVM Setup
        uses: jupitermoney/github-workflows/.github/actions/jvm-setup@main
        with:
          java-version: ${{ inputs.java_version }}
          services: ${{ inputs.services }}
          dbSchema: ${{ inputs.dbSchema }}
          fetch-depth: 0  # required for Sonar blame analysis and new-code detection

      # ─────────────── METADATA ───────────────

      - name: Generate Service Metadata
        id: metadata
        if: inputs.s3_deploy == false
        uses: jupitermoney/github-workflows/.github/actions/generate-metadata@main

      # ─────────────── TEST ───────────────

      - name: Build & Test
        run: ./gradlew build

      # ─────────────── SONAR (if enabled) ───────────────

      - name: Run Sonar Analysis
        run: |
          if [[ "${{ steps.metadata.outputs.sonar_enabled }}" == "true" ]]; then
            echo "Sonar enabled — running analysis..."
            # ./gradlew sonar
          else
            echo "Sonar disabled in project config, skipping."
          fi
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ─────────────────────────────────────────────────────────────────
  # OPTIONAL — S3 deploy for Lambda services
  # ─────────────────────────────────────────────────────────────────

  s3-deploy:
    needs: build-test
    if: inputs.s3_deploy == true
    runs-on: ubuntu-latest

    strategy:
      matrix:
        lambda: ${{ fromJSON(inputs.app_modules) }}

    steps:
      - uses: jupitermoney/github-workflows/.github/actions/s3-deploy@main
        with:
          java-version: ${{ inputs.java_version }}
          services: ${{ inputs.services }}
          dbSchema: ${{ inputs.dbSchema }}
          app-module: ${{ matrix.lambda.module }}
          s3-bucket: ${{ inputs.s3_bucket }}
          s3-prefix: ${{ matrix.lambda.s3_prefix }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}

  # ─────────────────────────────────────────────────────────────────
  # OPTIONAL — Build and push per module (matrix)
  # ─────────────────────────────────────────────────────────────────

  build-push:
    needs: build-test
    if: inputs.publish == true && inputs.s3_deploy == false
    runs-on: ubuntu-latest

    strategy:
      matrix: ${{ fromJSON(needs.build-test.outputs.matrix) }}

    steps:
      - uses: jupitermoney/github-workflows/.github/actions/ecr-build-push@main
        with:
          module: ${{ matrix.module }}
          image-name: ${{ matrix.toImage }}
          tag-prefix: "pr"
          ecr-registry: ${{ inputs.ecr_registry }}
          java-version: ${{ inputs.java_version }}
          services: ${{ inputs.services }}
          dbSchema: ${{ inputs.dbSchema }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          approval-service-url: "https://trivy.audit.jupiter.money"
          approval-service-token: ${{ secrets.APPROVAL_SERVICE_TOKEN }}
