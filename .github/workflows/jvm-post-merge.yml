name: Universal ECR Publisher

on:
  workflow_call:

    # ─────────────────────────────
    # INPUTS – FULLY CONFIGURABLE
    # ─────────────────────────────
    inputs:

      ecr_registry:
        type: string
        # staging account
        default: "454518750364.dkr.ecr.ap-south-1.amazonaws.com"

      java_version:
        type: string
        default: "21"
        required: true

      # ───── Services to start (comma-separated list e.g., postgres,minio) ─────
      services:
        type: string
        description: "Comma-separated list of services to start (e.g., postgres,minio)"
        default: ""
        required: false

      # ───── Multi-ECR push targets ─────
      ecr_targets:
        type: string
        description: |
          Optional JSON array of ECR push targets. Each entry must have:
            { "registry": "<account>.dkr.ecr.<region>.amazonaws.com", "repository": "<name>", "tag_prefix": "rc" }
          When provided, overrides ecr_registry — each (module × target) becomes one matrix entry.
          Example: '[{"registry":"454518750364.dkr.ecr.ap-south-1.amazonaws.com","repository":"nexus","tag_prefix":"rc"}]'
        default: ""
        required: false

# ─────────────────────────────────────────
# GLOBAL ENV
# ─────────────────────────────────────────
env:
  ECR_REGISTRY: ${{ inputs.ecr_registry }}

  # Security / Trivy
  APPROVAL_SERVICE_URL: "https://trivy.audit.jupiter.money"
  APPROVAL_SERVICE_TOKEN: ${{ secrets.APPROVAL_SERVICE_TOKEN }}

  # Git Context
  CI_COMMIT_SHA: ${{ github.sha }}
  GITHUB_USER: ${{ secrets.CI_GITHUB_USER }}
  GITHUB_TOKEN: ${{ secrets.CI_GITHUB_TOKEN }}

  # Artifactory
  ARTIFACTORY_USER: ${{ secrets.ARTIFACTORY_USER }}
  ARTIFACTORY_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}

  SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
  GITHUB_EVENT: ${{ toJson(github.event) }}
  IS_STANDARD_POST_COMMIT_WORKFLOW: true
  REPO_METADATA_TOKEN: ${{ secrets.CI_GITHUB_TOKEN_METADATA_REPO }}

# ─────────────────────────────────────────
# JOBS
# ─────────────────────────────────────────

jobs:

  # ─────────────────────────────────────────────────────────────────
  # STEP 1 — Resolve metadata + test entire codebase once + Sonar
  #
  # Single Gradle cold start: generateServiceMetadata and test run
  # in one invocation. Cache is saved here so matrix jobs downstream
  # restore it and skip all dependency downloads.
  # ─────────────────────────────────────────────────────────────────

  test:
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.metadata.outputs.matrix }}
      build_matrix: ${{ steps.build-matrix.outputs.matrix }}
      sonar_enabled: ${{ steps.metadata.outputs.sonar_enabled }}

    steps:
            # ─────────────── SERVICES ───────────────

      - name: Setup Services
        if: inputs.services != ''
        uses: jupitermoney/github-workflows/.github/actions/setup-services@main
        with:
          services: ${{ inputs.services }}

      - uses: jupitermoney/github-workflows/.github/actions/gradle-setup@main
        with:
          java-version: ${{ inputs.java_version }}
          fetch-depth: 1  # required for Sonar blame analysis

      - name: Generate Service Metadata
        id: metadata
        uses: jupitermoney/github-workflows/.github/actions/generate-metadata@main

      - name: Compute Build-Push Matrix
        id: build-matrix
        shell: bash
        env:
          MODULES: ${{ steps.metadata.outputs.matrix }}
          ECR_TARGETS: ${{ inputs.ecr_targets }}
          ECR_REGISTRY: ${{ inputs.ecr_registry }}
        run: |
          if [[ -z "$ECR_TARGETS" || "$ECR_TARGETS" == "[]" ]]; then
            # Backward-compatible: single registry, one entry per module
            MATRIX=$(echo "$MODULES" | jq -c \
              --arg registry "$ECR_REGISTRY" \
              '{include: [.include[] | . + {ecr_registry: $registry, tag_prefix: "rc"}]}')
          else
            # Fan-out: each module × each ecr_target becomes one matrix entry
            MATRIX=$(jq -cn \
              --argjson modules "$(echo "$MODULES" | jq '.include')" \
              --argjson targets "$ECR_TARGETS" \
              '{include: [$modules[] as $m | $targets[] | {module: $m.module, toImage: .repository, ecr_registry: .registry, tag_prefix: .tag_prefix}]}')
          fi
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

      # Skipped on pull_request events — PR validation is handled by jvm-app-pr-check.yml.
      - name: Run Tests
        if: github.event_name == 'push'
        run: |
          echo "Running build and tests"
          ./gradlew build

      # Runs in the same job so JaCoCo reports from the test step above are
      # already on disk — no need to re-run tests.
      - name: Run Sonar Analysis
        if: github.event_name == 'push' && steps.metadata.outputs.sonar_enabled == 'true'
        run: |
          echo "Running sonar"
          # ./gradlew sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ─────────────────────────────────────────────────────────────────
  # STEP 2 — Build and push per module (matrix)
  #
  # Gradle cache restored from STEP 1 — no dependency downloads.
  # Only jibDockerBuild runs per module; tests are already done.
  # ─────────────────────────────────────────────────────────────────

  build-push:
    needs: test
    runs-on: ubuntu-latest

    strategy:
      matrix: ${{ fromJSON(needs.test.outputs.build_matrix) }}

    steps:
      - uses: jm-imported-code/checkout@v1

      - uses: jupitermoney/github-workflows/.github/actions/ecr-build-push@main
        with:
          module: ${{ matrix.module }}
          image-name: ${{ matrix.toImage }}
          tag-prefix: ${{ matrix.tag_prefix }}
          ecr-registry: ${{ matrix.ecr_registry }}
          java-version: ${{ inputs.java_version }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          approval-service-url: ${{ env.APPROVAL_SERVICE_URL }}
          approval-service-token: ${{ secrets.APPROVAL_SERVICE_TOKEN }}
